# Example Traefik dynamic config for discord-forward-auth.
# Register Discord OAuth redirect URI: https://auth.example.com/_oauth
#
# REQUIRED: set COOKIE_DOMAIN=.example.com on discord-auth so CSRF + session
# cookies are shared between auth.example.com and app.example.com.

http:
  middlewares:
    # CRITICAL: strip client-supplied auth headers before ForwardAuth runs.
    strip-auth-headers:
      headers:
        customRequestHeaders:
          X-Auth-User: ""
          X-Auth-Groups: ""

    discord-auth:
      forwardAuth:
        address: http://discord-auth:4181
        authResponseHeaders:
          - X-Auth-User
          - X-Auth-Groups

    discord-auth-chain:
      chain:
        middlewares:
          - strip-auth-headers
          - discord-auth

  routers:
    # Auth host: OAuth callback + admin UI
    auth-host:
      rule: "Host(`auth.example.com`)"
      entryPoints: ["websecure"]
      service: discord-auth
      # Do not put forwardAuth on /_oauth (callback must be reachable unauthenticated).
      # Protect /admin via the service's own session checks + /api/* admin gate.
      tls: {}

    # Example protected apps (same middleware; host ACL is configured in admin UI).
    # e.g. grafana.example.com → required group "engineer"
    #      metabase.example.com → required group "bd"
    grafana:
      rule: "Host(`grafana.example.com`)"
      entryPoints: ["websecure"]
      middlewares: ["discord-auth-chain"]
      service: grafana
      tls: {}

    metabase:
      rule: "Host(`metabase.example.com`)"
      entryPoints: ["websecure"]
      middlewares: ["discord-auth-chain"]
      service: metabase
      tls: {}

  services:
    discord-auth:
      loadBalancer:
        servers:
          - url: "http://discord-auth:4181"
    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
    metabase:
      loadBalancer:
        servers:
          - url: "http://metabase:3000"
